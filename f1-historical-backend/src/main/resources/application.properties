spring.application.name=f1-historical-backend
# Puerto de ejecución del Backend
server.port=8082

# Configuración de la Base de Datos MySQL (Corregido a 3306)
spring.datasource.url=jdbc:mysql://localhost:3306/f1_historical_db?serverTimezone=UTC&useSSL=false
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuración de Hibernate / JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect